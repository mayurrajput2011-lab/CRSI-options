<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕯 Candlestick Pattern Encyclopedia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{--bg:#0a0c10;--surf:#111318;--surf2:#181b22;--border:#1e222c;--border2:#252a36;--text:#e2e8f0;--muted:#64748b;--accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

nav{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
.nav-brand{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap;}
.search-wrap{flex:1;max-width:420px;position:relative;}
.search-wrap input{width:100%;background:var(--surf2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:8px 12px 8px 34px;outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--accent);}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);}
.nav-right{display:flex;align-items:center;gap:8px;}
.npill{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:700;border:1px solid;white-space:nowrap;cursor:default;}
.np-g{background:rgba(16,185,129,.1);color:var(--green);border-color:rgba(16,185,129,.25);}
.np-r{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.25);}
.np-a{background:rgba(245,158,11,.1);color:var(--accent);border-color:rgba(245,158,11,.25);}
.np-p{background:rgba(139,92,246,.1);color:var(--purple);border-color:rgba(139,92,246,.25);}
.back-btn{background:var(--surf2);border:1px solid var(--border2);color:var(--muted);font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all .15s;}
.back-btn:hover{color:var(--text);border-color:var(--accent);}

.fbar{background:var(--surf);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;position:sticky;top:54px;z-index:99;}
.fbtn{background:var(--surf2);border:1px solid var(--border2);border-radius:5px;color:var(--muted);font-size:10px;font-weight:700;padding:4px 11px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.04em;}
.fbtn:hover{color:var(--text);}
.fbtn.on{color:var(--accent);background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.35);}
.fsep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0;}

.wrap{max-width:1600px;margin:0 auto;padding:18px 20px;}

/* ── INDICATOR PANELS ── */
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
@media(max-width:700px){.ind-grid{grid-template-columns:1fr;}}
.ind-card{background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:16px 18px;}
.ind-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:12px;}
.ind-row{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:8px;background:var(--surf2);border:1px solid var(--border);margin-bottom:8px;}
.ind-row:last-child{margin-bottom:0;}
.ind-svg-wrap{flex-shrink:0;}
.ind-body{flex:1;}
.ind-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.ind-sub{font-size:10px;color:var(--muted);line-height:1.4;}
.ind-str-bar{margin-top:6px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.ind-str-fill{height:100%;border-radius:3px;}
.ind-right{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:48px;}
.big-arrow{font-size:28px;line-height:1;font-weight:700;}
.big-pct{font-family:var(--mono);font-size:13px;font-weight:700;}
.c-up{color:var(--green);}.c-dn{color:var(--red);}.c-nt{color:var(--muted);}

/* ── COMBO / FREE SPACE ── */
.section-card{background:var(--surf);border:1px solid var(--border);border-radius:11px;padding:16px 18px;margin-bottom:20px;}
.section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:14px;}

.combo-row{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;background:var(--surf2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
.combo-rank{font-size:18px;width:28px;flex-shrink:0;}
.combo-body{flex:1;}
.combo-name{font-size:12px;font-weight:700;margin-bottom:4px;}
.combo-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.ctag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;}
.ct-g{background:rgba(16,185,129,.12);color:var(--green);}
.ct-r{background:rgba(239,68,68,.12);color:var(--red);}
.ct-a{background:rgba(245,158,11,.12);color:var(--accent);}
.ct-b{background:rgba(59,130,246,.12);color:var(--blue);}
.ct-m{background:rgba(100,116,139,.1);color:var(--muted);}
.combo-why{font-size:10px;color:var(--muted);line-height:1.5;}
.combo-pct-block{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.combo-pct{font-family:var(--mono);font-size:22px;font-weight:700;}
.combo-move{font-size:10px;font-family:var(--mono);color:var(--muted);}
.combo-bar{width:80px;height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.combo-bar-fill{height:100%;border-radius:2px;}

.space-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.space-item{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:13px;}
.si-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.si-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;}
.si-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;}
.sb-block{background:rgba(239,68,68,.12);color:var(--red);}
.sb-ok{background:rgba(16,185,129,.12);color:var(--green);}
.sb-warn{background:rgba(245,158,11,.12);color:var(--accent);}
.si-desc{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.si-impact{font-size:10px;font-weight:700;}

/* ── CATEGORY HEADER ── */
.cat-hdr{display:flex;align-items:center;gap:10px;margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.cat-ico{font-size:18px;}
.cat-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);}
.cat-cnt{font-size:10px;color:var(--muted);background:var(--surf2);padding:2px 8px;border-radius:4px;}

/* ── PATTERN GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:10px;}

/* ── PATTERN CARD — bigger everything ── */
.pcard{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .18s;position:relative;}
.pcard:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.35);}
.pcard.xpand{border-color:var(--accent);background:var(--surf2);}
.pcard.elite{border-color:rgba(139,92,246,.35);box-shadow:0 0 0 1px rgba(139,92,246,.1);}

/* Card top — big SVG left, info right */
.ctop{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.csvg-box{flex-shrink:0;background:var(--surf2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;align-items:center;justify-content:center;min-width:80px;}
.cmeta{flex:1;min-width:0;}
.cname{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px;}
.cbadges{display:flex;flex-wrap:wrap;gap:3px;}
.cbadge{font-size:9px;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.cb-bull{background:rgba(16,185,129,.12);color:var(--green);}
.cb-bear{background:rgba(239,68,68,.12);color:var(--red);}
.cb-neut{background:rgba(100,116,139,.12);color:var(--muted);}
.cb-rev{background:rgba(245,158,11,.12);color:var(--accent);}
.cb-cont{background:rgba(59,130,246,.12);color:var(--blue);}
.cb-elite{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3);}
.ccnt{position:absolute;top:10px;right:10px;font-size:9px;color:var(--muted);background:var(--surf2);padding:2px 7px;border-radius:3px;border:1px solid var(--border);}

/* ── BIG NEXT-MOVE BLOCK ── */
.nmove{display:flex;align-items:stretch;border-radius:9px;overflow:hidden;border:1px solid;margin-top:2px;}
.nmove.up{border-color:rgba(16,185,129,.3);}
.nmove.dn{border-color:rgba(239,68,68,.3);}
.nmove.nt{border-color:rgba(100,116,139,.2);}
/* Arrow column */
.nm-arw{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px;gap:3px;flex-shrink:0;}
.nmove.up .nm-arw{background:rgba(16,185,129,.1);}
.nmove.dn .nm-arw{background:rgba(239,68,68,.1);}
.nmove.nt .nm-arw{background:rgba(100,116,139,.07);}
.nm-sym{font-size:28px;line-height:1;font-weight:700;}
.nmove.up .nm-sym{color:var(--green);}
.nmove.dn .nm-sym{color:var(--red);}
.nmove.nt .nm-sym{color:var(--muted);}
/* PCT column */
.nm-pct{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 12px;border-left:1px solid;flex-shrink:0;}
.nmove.up .nm-pct{border-left-color:rgba(16,185,129,.2);}
.nmove.dn .nm-pct{border-left-color:rgba(239,68,68,.2);}
.nmove.nt .nm-pct{border-left-color:rgba(100,116,139,.15);}
.nm-pct-val{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1;}
.nmove.up .nm-pct-val{color:var(--green);}
.nmove.dn .nm-pct-val{color:var(--red);}
.nmove.nt .nm-pct-val{color:var(--muted);}
.nm-pct-lbl{font-size:8px;color:var(--muted);font-weight:600;margin-top:2px;letter-spacing:.05em;}
/* Text column */
.nm-txt{flex:1;padding:8px 12px;display:flex;flex-direction:column;justify-content:center;gap:3px;}
.nm-label{font-size:12px;font-weight:700;}
.nmove.up .nm-label{color:var(--green);}
.nmove.dn .nm-label{color:var(--red);}
.nmove.nt .nm-label{color:var(--muted);}
.nm-sub{font-size:10px;color:var(--muted);line-height:1.3;}
/* Avg move pill */
.nm-avg{font-size:10px;font-family:var(--mono);font-weight:700;margin-top:3px;}

/* ── RELIABILITY BAR ── */
.rel-row{display:flex;align-items:center;gap:8px;margin-top:9px;}
.rel-lbl{font-size:9px;color:var(--muted);width:60px;flex-shrink:0;letter-spacing:.04em;font-weight:600;}
.rel-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.rel-fill{height:100%;border-radius:3px;transition:width .5s;}
.rel-val{font-family:var(--mono);font-size:10px;font-weight:700;width:34px;text-align:right;}

/* ── EXPAND CONTENT ── */
.cexpand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.pcard.xpand .cexpand{display:block;}
.exp-desc{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:10px;padding:9px 11px;background:var(--surf);border-radius:7px;}
.exp-rules{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.exp-rule{font-size:10px;color:var(--text);display:flex;gap:6px;line-height:1.45;}
.exp-rule span:first-child{color:var(--accent);flex-shrink:0;}
.exp-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:5px;}
.exp-align{border-top:1px solid var(--border);padding-top:10px;}
.arow{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;}
.aicon{width:18px;text-align:center;flex-shrink:0;}
.akey{font-weight:600;color:var(--text);width:58px;flex-shrink:0;}
.aval{color:var(--muted);flex:1;}
.atag{font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;flex-shrink:0;}
.at-best{background:rgba(16,185,129,.15);color:var(--green);}
.at-good{background:rgba(245,158,11,.12);color:var(--accent);}
.at-bad{background:rgba(239,68,68,.12);color:var(--red);}
.exp-stats{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.etag{font-size:10px;padding:3px 9px;border-radius:4px;font-weight:600;}
.et-g{background:rgba(16,185,129,.1);color:var(--green);}
.et-r{background:rgba(239,68,68,.1);color:var(--red);}
.et-a{background:rgba(245,158,11,.1);color:var(--accent);}
.et-b{background:rgba(59,130,246,.1);color:var(--blue);}

.empty-msg{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">🕯 Candle Encyclopedia</div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="q" placeholder="Search… hammer, doji, engulfing, star, marubozu" oninput="go()">
  </div>
  <div class="nav-right">
    <span class="npill np-g" id="pill_b">—</span>
    <span class="npill np-r" id="pill_r">—</span>
    <span class="npill np-a" id="pill_n">—</span>
    <span class="npill np-p" id="pill_e">—</span>
    <a class="back-btn" href="index.html">← Back to Journal</a>
  </div>
</nav>

<div class="fbar">
  <button class="fbtn on" data-f="all" onclick="setF('all',this)">All</button>
  <div class="fsep"></div>
  <button class="fbtn" data-f="bullish" onclick="setF('bullish',this)">🟢 Bullish</button>
  <button class="fbtn" data-f="bearish" onclick="setF('bearish',this)">🔴 Bearish</button>
  <button class="fbtn" data-f="neutral" onclick="setF('neutral',this)">⚪ Neutral</button>
  <div class="fsep"></div>
  <button class="fbtn" data-f="single" onclick="setF('single',this)">1-Candle</button>
  <button class="fbtn" data-f="double" onclick="setF('double',this)">2-Candle</button>
  <button class="fbtn" data-f="triple" onclick="setF('triple',this)">3-Candle</button>
  <button class="fbtn" data-f="multi" onclick="setF('multi',this)">4C+</button>
  <div class="fsep"></div>
  <button class="fbtn" data-f="reversal" onclick="setF('reversal',this)">↩ Reversal</button>
  <button class="fbtn" data-f="continuation" onclick="setF('continuation',this)">→ Continuation</button>
  <div class="fsep"></div>
  <button class="fbtn" data-f="elite" onclick="setF('elite',this)">⚡ Elite Only</button>
</div>

<div class="wrap">
  <div id="ind_section">
    <div class="ind-grid">
      <div class="ind-card"><div class="ind-hdr">📈 ATR Direction — Strength Signal</div><div id="atr_rows"></div></div>
      <div class="ind-card"><div class="ind-hdr">📉 Connors RSI — Momentum Signal</div><div id="crsi_rows"></div></div>
    </div>
    <div class="section-card">
      <div class="section-hdr">🏆 Top Combination Setups (Candle + ATR + CRSI + Free Space)</div>
      <div id="combo_rows"></div>
    </div>
    <div class="section-card">
      <div class="section-hdr">🛤 Free Space — What Must Be Clear For Price To Move</div>
      <div class="space-grid" id="space_grid"></div>
    </div>
  </div>
  <div id="pat_section"></div>
</div>

<script>
const GRN='#10b981',RED='#ef4444',AMB='#f59e0b',MUT='#64748b',BLU='#3b82f6',PUR='#8b5cf6';

// ── SVG helpers ──
function C(cx,bY,bH,wT,wB,col,bw=9){
  bH=Math.max(2,bH);
  return `<line x1="${cx}" y1="${wT}" x2="${cx}" y2="${bY}" stroke="${col}" stroke-width="1.8" stroke-linecap="round"/>
<rect x="${cx-bw/2}" y="${bY}" width="${bw}" height="${bH}" rx="1.5" fill="${col}" opacity=".92"/>
<line x1="${cx}" y1="${bY+bH}" x2="${cx}" y2="${wB}" stroke="${col}" stroke-width="1.8" stroke-linecap="round"/>`;
}
function DJ(cx,mY,wT,wB,col=MUT){
  return `<line x1="${cx}" y1="${wT}" x2="${cx}" y2="${wB}" stroke="${col}" stroke-width="1.6"/>
<line x1="${cx-5}" y1="${mY}" x2="${cx+5}" y2="${mY}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>`;
}
function sw(w,h,inner){return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;}
function sl(pts,w,h,col){
  const xs=pts.map((_,i)=>i/(pts.length-1)*w);
  const mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const ys=pts.map(v=>h-((v-mn)/rng)*(h*.78)-h*.11);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <polyline points="${xs.map((x,i)=>x.toFixed(1)+','+ys[i].toFixed(1)).join(' ')}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${xs[xs.length-1]}" cy="${ys[ys.length-1]}" r="3" fill="${col}"/></svg>`;
}

// ── PATTERN DATA ──
// next: up/down/neutral | pct: accuracy % | reliability: 0-100
// atr: best ATR | crsi: best CRSI | elite: bool
const P=[
// ── SINGLE BULLISH ──
{name:'Hammer',bias:'bullish',c:'single',type:'reversal',next:'up',pct:65,avgMove:'+1.0%',reliability:65,atr:'Rising',crsi:'Rising',space:'1 ATR clear above close',elite:false,
 desc:'Forms at bottom of downtrend. Small body at top with long lower wick (≥2× body). Sellers pushed price down but buyers recovered near close. Confirmation by next bullish candle increases reliability.',
 rules:['Lower wick ≥ 2× the body','Small body near the top','Little or no upper wick','Appears after a downtrend'],
 svg:()=>sw(52,66,C(26,10,8,8,60,GRN))},
{name:'Inverted Hammer',bias:'bullish',c:'single',type:'reversal',next:'up',pct:55,avgMove:'+0.7%',reliability:55,atr:'Neutral',crsi:'Rising',space:'Needs confirmation next session',elite:false,
 desc:'Long upper wick, small body at bottom, appears after downtrend. Early buyers tried to push higher. Needs follow-through bullish candle for confirmation.',
 rules:['Upper wick ≥ 2× the body','Small body at the bottom','After downtrend','Confirm with next session'],
 svg:()=>sw(52,66,C(26,46,8,6,58,GRN))},
{name:'Dragonfly Doji',bias:'bullish',c:'single',type:'reversal',next:'up',pct:65,avgMove:'+0.9%',reliability:65,atr:'Neutral',crsi:'Rising',space:'No OB/FVG within 0.5 ATR above',elite:false,
 desc:'Open = High = Close at top, with a long lower shadow. Strong rejection of lower prices. Buyers completely overcame sellers by session close.',
 rules:['No body (tiny) at the very top','Long lower wick','No upper wick','At support or demand zone'],
 svg:()=>sw(52,66,`<line x1="26" y1="6" x2="26" y2="60" stroke="${GRN}" stroke-width="1.8"/><line x1="20" y1="7" x2="32" y2="7" stroke="${GRN}" stroke-width="3" stroke-linecap="round"/>`)},
{name:'Bullish Marubozu',bias:'bullish',c:'single',type:'continuation',next:'up',pct:78,avgMove:'+1.8%',reliability:78,atr:'Rising',crsi:'Rising',space:'No resistance for 1.5 ATR above',elite:true,
 desc:'Opens at low, closes at high — no wicks at all. Pure buyer domination from open to close. One of the strongest single-candle signals. High reliability with rising ATR.',
 rules:['No upper wick (< 0.1%)','No lower wick','Long green body','High volume confirms'],
 svg:()=>sw(52,66,C(26,6,54,6,60,GRN))},
{name:'Spinning Top (Bull)',bias:'bullish',c:'single',type:'reversal',next:'up',pct:48,avgMove:'+0.4%',reliability:48,atr:'Neutral',crsi:'Neutral',space:'Any — low conviction',elite:false,
 desc:'Small body with roughly equal wicks on both sides. Indecision. After a downtrend, may signal seller exhaustion but needs confirmation.',

// ── RENDER FUNCTIONS ──
function rc(r){return r>=70?GRN:r>=55?AMB:RED;}

function renderATR(){

    const dir=a.next==='up'?'up':a.next==='down'?'dn':'nt';
    const col=a.next==='up'?GRN:a.next==='down'?RED:AMB;
    const arrow=a.next==='up'?'↑':a.next==='down'?'↓':'—';
    return `<div class="ind-row">
      <div class="ind-svg-wrap">${a.svg}</div>
      <div class="ind-body">
        <div class="ind-name c-${dir}">${a.name}</div>
        <div class="ind-sub">${a.sub}</div>
        <div class="ind-sub" style="margin-top:3px;color:var(--text);font-size:10px;">${a.meaning}</div>
        <div class="ind-str-bar" style="margin-top:6px;"><div class="ind-str-fill" style="width:${a.strength}%;background:${col};"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px;"><span>Strength</span><span style="font-family:var(--mono);font-weight:700;color:${col};">${a.strength}%</span></div>
      </div>
      <div class="ind-right">
        <div class="big-arrow c-${dir}">${arrow}</div>
        <div class="big-pct c-${dir}">${a.pct}%</div>
        <div style="font-size:8px;color:var(--muted);margin-top:2px;">probability</div>
      </div>
    </div>`;
  }).join('');
}

// ── PATTERN CARDS ──
let curF='all', curQ='';
const CATS=[
  {k:'single',label:'Single Candle Patterns',icon:'🕯'},
  {k:'double',label:'Two-Candle Patterns',icon:'🕯🕯'},
  {k:'triple',label:'Three-Candle Patterns',icon:'🕯🕯🕯'},
  {k:'multi',label:'Multi-Candle Patterns',icon:'📊'},
];

function getVis(){
  return P.filter(p=>{
    const mF=curF==='all'||p.bias===curF||p.c===curF||p.type===curF||(curF==='neutral'&&p.bias==='neutral')||(curF==='elite'&&p.elite);
    const q=curQ.toLowerCase();
    const mQ=!q||p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.bias.includes(q)||p.type.includes(q)||p.c.includes(q);
    return mF&&mQ;
  });
}

function card(p,i){
  const dir=p.next==='up'?'up':p.next==='down'?'dn':'nt';
  const arrow=p.next==='up'?'↑':p.next==='down'?'↓':'—';
  const dirLabel=p.next==='up'?'BULLISH NEXT':p.next==='down'?'BEARISH NEXT':'NEUTRAL / WAIT';
  const col=p.next==='up'?GRN:p.next==='down'?RED:MUT;
  const tlbl={single:'1C',double:'2C',triple:'3C',multi:'4C+'}[p.c];
  const rcol=rc(p.reliability);
  const rules=p.rules.map(r=>`<div class="exp-rule"><span>▸</span><span>${r}</span></div>`).join('');
  const atrCls=p.atr==='Rising'?'at-best':p.atr==='Falling'?'at-bad':'at-good';
  const crsiDir=p.bias==='bullish'?'Rising':p.bias==='bearish'?'Falling':'Any';
  const crsiCls=p.bias!=='neutral'?'at-best':'at-good';

  return `<div class="pcard${p.elite?' elite':''}" id="card_${i}" onclick="toggle(${i})">
    <span class="ccnt">${tlbl}${p.elite?' ⚡':''}</span>
    <div class="ctop">
      <div class="csvg-box">${p.svg()}</div>
      <div class="cmeta">
        <div class="cname">${p.name}</div>
        <div class="cbadges">
          <span class="cbadge ${p.bias==='bullish'?'cb-bull':p.bias==='bearish'?'cb-bear':'cb-neut'}">${p.bias}</span>
          <span class="cbadge ${p.type==='reversal'?'cb-rev':'cb-cont'}">${p.type}</span>
          ${p.elite?'<span class="cbadge cb-elite">⚡ elite</span>':''}
        </div>
      </div>
    </div>

    <div class="nmove ${dir}">
      <div class="nm-arw">
        <div class="nm-sym">${arrow}</div>
      </div>
      <div class="nm-pct">
        <div class="nm-pct-val">${p.pct}%</div>
        <div class="nm-pct-lbl">ACCURACY</div>
      </div>
      <div class="nm-txt">
        <div class="nm-label">${dirLabel}</div>
        <div class="nm-sub">${p.avgMove} expected · ${p.atr} ATR</div>
        <div class="nm-avg" style="color:${col};">${p.pct >= 70 ? '⚡ High Probability' : p.pct >= 60 ? '✓ Moderate' : '⚠ Low — needs confirmation'}</div>
      </div>
    </div>

    <div class="rel-row">
      <span class="rel-lbl">RELIABILITY</span>
      <div class="rel-track"><div class="rel-fill" style="width:${p.reliability}%;background:${rcol};"></div></div>
      <span class="rel-val" style="color:${rcol};">${p.reliability}%</span>
    </div>

    <div class="cexpand">
      <div class="exp-desc">${p.desc}</div>
      <div class="exp-section">HOW TO IDENTIFY</div>
      <div class="exp-rules">${rules}</div>
      <div class="exp-align">
        <div class="exp-section" style="margin-bottom:6px;">BEST CONDITIONS</div>
        <div class="arow"><span class="aicon">📈</span><span class="akey">ATR:</span><span class="aval">${p.atr}</span><span class="atag ${atrCls}">${p.atr==='Rising'?'BEST':p.atr==='Neutral'?'OK':'AVOID'}</span></div>
        <div class="arow"><span class="aicon">📉</span><span class="akey">CRSI:</span><span class="aval">${crsiDir}</span><span class="atag ${crsiCls}">ALIGNED</span></div>
        <div class="arow"><span class="aicon">🛤</span><span class="akey">Space:</span><span class="aval" style="font-size:10px;">${p.space}</span></div>
      </div>
      <div class="exp-stats">
        <span class="etag et-${p.next==='up'?'g':p.next==='down'?'r':'a'}">Accuracy: ${p.pct}%</span>
        <span class="etag et-a">Move: ${p.avgMove}</span>
        <span class="etag et-b">ATR: ${p.atr}</span>
        <span class="etag et-b">Type: ${p.type}</span>
      </div>
    </div>
  </div>`;
}

function toggle(i){document.getElementById('card_'+i).classList.toggle('xpand');}

function renderPats(){
  const vis=getVis();
  const sec=document.getElementById('pat_section');
  if(!vis.length){sec.innerHTML='<div class="empty-msg">No patterns match. Try a different filter.</div>';return;}
  const grouped=['all','bullish','bearish','neutral','reversal','continuation','elite'].includes(curF);
  let html='';
  if(grouped){
    CATS.forEach(cat=>{
      const cp=vis.filter(p=>p.c===cat.k);
      if(!cp.length)return;
      html+=`<div class="cat-hdr"><span class="cat-ico">${cat.ico}</span><span class="cat-ttl">${cat.label}</span><span class="cat-cnt">${cp.length} patterns</span></div>`;
      html+=`<div class="pgrid">${cp.map(p=>card(p,P.indexOf(p))).join('')}</div>`;
    });
  } else {
    html=`<div class="pgrid">${vis.map(p=>card(p,P.indexOf(p))).join('')}</div>`;
  }
  sec.innerHTML=html;
  updatePills();
}

function updatePills(){
  document.getElementById('pill_b').textContent=P.filter(p=>p.bias==='bullish').length+' Bullish';
  document.getElementById('pill_r').textContent=P.filter(p=>p.bias==='bearish').length+' Bearish';
  document.getElementById('pill_n').textContent=P.filter(p=>p.bias==='neutral').length+' Neutral';
  document.getElementById('pill_e').textContent='⚡ '+P.filter(p=>p.elite).length+' Elite';
}

function setF(f,btn){
  curF=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('ind_section').style.display=(f==='all'||f==='elite')?'block':'none';
  renderPats();
}

function go(){
  curQ=document.getElementById('q').value;
  renderPats();
}

renderATR();renderCRSI();renderCombos();renderSpace();renderPats();
</script>
